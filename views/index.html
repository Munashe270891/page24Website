<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 24 - Zimbabwean Voices, Reimagined</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <div class="logo">PAGE 24</div>
        <nav>
            <a href="#">Browse Books</a>
            <a href="#">Top Authors</a>
            <a href="/dashboard" class="nav-btn">Author Portal</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Zimbabwean Voices, Reimagined</h1>
        <p>Discover locally published books. Simple ecosystem payments using EcoCash & OneMoney.</p>
        
        <!-- SEARCH BAR CONTAINER COMPONENT -->
        <div class="search-container" style="margin-top: 25px;">
            <input type="text" id="store-search" placeholder="🔍 Search books by title or author..." style="width: 100%; max-width: 500px; padding: 14px 20px; border: none; border-radius: 25px; font-size: 15px; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
        </div>
    </section>

    <main class="content-wrapper">
        <h2>Featured Zimbabwean Stories</h2>
        <div class="book-grid">
            <!-- Left completely empty! The main.js script will inject your real SQLite database books here -->
        </div>
    </main>

        <!-- BOOK DETAIL & DESCRIPTION MODAL OVERLAY -->
    <div id="preview-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--bg-cream); padding: 30px; border-radius: 8px; max-width: 500px; width: 90%; position: relative; border: 1px solid var(--border-tan); box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
            <span id="close-modal-btn" style="position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text-dark); font-weight: bold;">&times;</span>
            
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <img id="modal-cover" src="" alt="Book Cover" style="width: 120px; height: 170px; object-fit: cover; border-radius: 4px; border: 1px solid #ccc;">
                <div style="flex: 1;">
                    <h2 id="modal-title" style="margin: 0 0 5px 0; font-size: 20px; color: var(--primary-green);">Book Title</h2>
                    <p id="modal-author" style="margin: 0 0 10px 0; font-style: italic; opacity: 0.8;">By Author Name</p>
                    <p id="modal-price" style="margin: 0; font-weight: bold; color: var(--accent-orange); font-size: 18px;">$0.00 USD</p>
                </div>
            </div>
            
            <h4 style="margin: 20px 0 8px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; font-size: 14px; letter-spacing: 0.5px;">BOOK SUMMARY</h4>
            <p id="modal-description" style="margin: 0 0 25px 0; font-size: 14px; line-height: 1.5; max-height: 180px; overflow-y: auto; color: #444;">Book description text will load here...</p>
            
            <button id="modal-buy-btn" style="background: var(--primary-green); color: white; border: none; width: 100%; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 15px;">Unlock Full Book</button>
        </div>
    </div>

    <!-- FIXED: Connected the frontend script runner engine line below -->
    <script src="/js/main.js"></script>
</body>
</html>
